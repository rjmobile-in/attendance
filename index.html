<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RJ Mobile — Admin Portal</title>
  
  <script>
    if (localStorage.getItem('rj_admin_theme') === 'light') {
      document.documentElement.classList.add('light-theme');
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-base: #09090b; --card-bg: #18181b; --card-bg-alpha: rgba(24, 24, 27, 0.75);
      --card-border: #27272a; --primary: #8b5cf6; --primary-hover: #a78bfa;
      --primary-alpha: rgba(139, 92, 246, 0.15); --text-main: #f4f4f5; --text-soft: #a1a1aa;
      --success: #10b981; --success-alpha: rgba(16, 185, 129, 0.15); --danger: #ef4444;
      --danger-alpha: rgba(239, 68, 68, 0.15); --input-bg: #09090b;
      --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.4);
    }
    html.light-theme {
      --bg-base: #f8fafc; --card-bg: #ffffff; --card-bg-alpha: rgba(255, 255, 255, 0.85);
      --card-border: #e2e8f0; --primary: #4f46e5; --primary-hover: #6366f1;
      --primary-alpha: rgba(79, 70, 229, 0.1); --text-main: #0f172a; --text-soft: #64748b;
      --input-bg: #f1f5f9; --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.05);
    }

    body { font-family: 'Inter', sans-serif; background: var(--bg-base); color: var(--text-main); font-size: 15px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px; overflow-x: hidden; }
    .glass-effect { background: var(--card-bg-alpha); backdrop-filter: blur(16px); border: 1px solid var(--card-border); }

    /* Loader & Toast */
    #global-loader { position: fixed; inset: 0; background: rgba(var(--bg-base), 0.9); backdrop-filter: blur(12px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; color: var(--text-soft); font-weight: 500; }
    .spinner { width: 48px; height: 48px; border: 4px solid var(--card-border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s infinite; margin-bottom: 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #toast { visibility: hidden; min-width: 300px; display: flex; align-items: center; justify-content: center; gap: 12px; padding: 16px 24px; position: fixed; z-index: 10000; bottom: 40px; left: 50%; transform: translate(-50%, 20px); font-size: 15px; font-weight: 600; color: var(--text-main); border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.3s, transform 0.3s, visibility 0.3s; }
    #toast.show { visibility: visible; opacity: 1; transform: translate(-50%, 0); }

    /* Login Screen */
    #login-screen { display: none; background: var(--card-bg); padding: 48px 40px; border-radius: 24px; box-shadow: var(--shadow-soft); text-align: center; width: 100%; max-width: 420px; margin-top: 10vh; border: 1px solid var(--card-border); }
    #login-screen h2 { font-weight: 800; font-size: 28px; margin-bottom: 8px; font-family: 'Plus Jakarta Sans', sans-serif; }
    #login-screen p { color: var(--text-soft); margin-bottom: 32px; }
    .input-field { width: 100%; padding: 16px; border-radius: 14px; border: 1px solid var(--card-border); background: var(--input-bg); color: var(--text-main); margin-bottom: 16px; outline: none; }
    .input-field:focus { border-color: var(--primary); }
    #login-btn { width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--primary); color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    #login-btn:hover { transform: translateY(-2px); }
    #error-msg { color: var(--danger); font-size: 14px; margin-top: 16px; display: none; }

    /* Dashboard Layout */
    #dashboard { display: none; width: 100%; max-width: 1200px; flex-direction: column; gap: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; border-radius: 20px; }
    .brand-title { font-size: 20px; font-weight: 800; font-family: 'Plus Jakarta Sans', sans-serif; }
    .btn-secondary { background: transparent; border: 1px solid var(--card-border); color: var(--text-main); padding: 8px 16px; border-radius: 12px; cursor: pointer; font-weight: 600; }

    /* Staff Matrix Styles */
    .admin-section { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 24px; padding: 24px; width: 100%; }
    .section-header h2 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 22px; margin-bottom: 4px; }
    .section-header p { color: var(--text-soft); font-size: 14px; margin-bottom: 20px; }
    
    .table-container { width: 100%; overflow-x: auto; background: var(--input-bg); border: 1px solid var(--card-border); border-radius: 16px; }
    #matrix-table { width: 100%; border-collapse: collapse; min-width: 900px; }
    #matrix-table th, #matrix-table td { padding: 16px; border-bottom: 1px solid var(--card-border); border-right: 1px solid var(--card-border); text-align: center; font-size: 14px; vertical-align: top; }
    #matrix-table th { background: var(--card-bg); font-weight: 700; color: var(--text-soft); white-space: nowrap; }
    
    .sticky-col { position: sticky; left: 0; background: var(--card-bg) !important; z-index: 2; text-align: left !important; font-weight: 700; box-shadow: 2px 0 5px rgba(0,0,0,0.2); min-width: 160px; vertical-align: middle !important; }
    
    .cell-absent { color: var(--danger); font-weight: 600; background: rgba(239, 68, 68, 0.05); vertical-align: middle !important;}
    .cell-present { font-size: 13px; line-height: 1.6; background: rgba(16, 185, 129, 0.02); }
    .time-block { margin-bottom: 8px; border-bottom: 1px solid var(--card-border); padding-bottom: 8px; }
    
    /* Interactive Badges */
    .badge-container { display: flex; flex-direction: column; gap: 6px; align-items: center; }
    .status-badge { display: inline-flex; align-items: center; justify-content: center; width: 100%; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; user-select: none; }
    .status-badge:hover { filter: brightness(1.2); transform: scale(1.02); }
    .badge-yes { background: var(--success-alpha); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.3); }
    .badge-no { background: var(--danger-alpha); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); }
    .badge-disabled { background: var(--card-border); color: var(--text-soft); cursor: not-allowed; }

  </style>
</head>
<body>

  <div id="global-loader" class="glass-effect"><div class="spinner"></div><p>Connecting to secure database...</p></div>
  <div id="toast" class="glass-effect"><div id="toast-icon"></div><div id="toast-msg"></div></div>

  <!-- LOGIN SCREEN -->
  <div id="login-screen">
    <h2>Admin Portal</h2>
    <p>Sign in to view attendance records.</p>
    <input type="email" id="email-input" class="input-field" placeholder="director@rjmobile.com" />
    <input type="password" id="password-input" class="input-field" placeholder="Enter password" />
    <button id="login-btn">Secure Login</button>
    <div id="error-msg">Authentication failed.</div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">
    <div class="header glass-effect">
      <div class="brand-title">RJ Mobile HQ</div>
      <div>
        <button id="theme-toggle" class="btn-secondary">Toggle Theme</button>
        <button id="logout-btn" class="btn-secondary">Log Out</button>
      </div>
    </div>

    <!-- STAFF MATRIX SECTION -->
    <div id="staff-matrix-section" class="admin-section">
      <div class="section-header">
        <h2>Staff Attendance Matrix</h2>
        <p>Last 7 Days Overview. Click on T-Shirt or ID badges to toggle Yes/No.</p>
      </div>
      
      <div class="table-container">
        <table id="matrix-table">
          <thead>
            <tr id="matrix-header-row">
              <th class="sticky-col">Staff Name</th>
              <!-- Javascript will inject the dates here -->
            </tr>
          </thead>
          <tbody id="matrix-body">
            <!-- Javascript will inject the staff rows here -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

    // Your Firebase Config
    const firebaseConfig = { 
      apiKey: "AIzaSyD3nTvimIC_Tnc10x8yivnMlVFsZWyjKwE",
      authDomain: "staff-bcb17.firebaseapp.com",
      projectId: "staff-bcb17",
      storageBucket: "staff-bcb17.firebasestorage.app",
      messagingSenderId: "19785118704",
      appId: "1:19785118704:web:915272bdf29ebaefb6a335"
    };

    const app = initializeApp(firebaseConfig, "AdminApp");
    const db = getFirestore(app);
    const auth = getAuth(app);

    function displayToast(msg, statusType = "success") {
      const toast = document.getElementById('toast');
      document.getElementById('toast-msg').innerText = msg;
      toast.className = "glass-effect show";
      setTimeout(() => { toast.className = "glass-effect"; }, 3000);
    }

    // Auth Logic
    onAuthStateChanged(auth, (user) => {
      document.getElementById('global-loader').style.display = 'none';
      if (user) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'flex';
        loadStaffMatrix();
      } else {
        document.getElementById('login-screen').style.display = 'block';
        document.getElementById('dashboard').style.display = 'none';
      }
    });

    document.getElementById('login-btn').addEventListener('click', async () => {
      const e = document.getElementById('email-input').value, p = document.getElementById('password-input').value, msg = document.getElementById('error-msg');
      try { msg.style.display = 'none'; await signInWithEmailAndPassword(auth, e, p); } 
      catch (err) { msg.style.display = 'block'; msg.innerText = err.message; }
    });
    document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

    // Theme Logic
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const isLight = document.documentElement.classList.toggle('light-theme');
      localStorage.setItem('rj_admin_theme', isLight ? 'light' : 'dark');
    });

    // --- MATRIX LOGIC ---
    async function loadStaffMatrix() {
      const matrixHeader = document.getElementById('matrix-header-row');
      const matrixBody = document.getElementById('matrix-body');
      
      // 1. Generate the last 7 dates
      const dates = [];
      for (let i = 6; i >= 0; i--) {
        let d = new Date();
        d.setDate(d.getDate() - i);
        dates.push(d.toDateString()); // e.g. "Wed Aug 14 2024"
      }

      matrixHeader.innerHTML = '<th class="sticky-col">Staff Name</th>';
      dates.forEach(date => {
        // Just show the Day and Month (e.g. "Wed Aug 14")
        matrixHeader.innerHTML += `<th>${date.substring(0, 10)}</th>`;
      });

      // 2. Fetch all logs from Firebase
      matrixBody.innerHTML = '<tr><td colspan="8">Loading data...</td></tr>';
      const logsSnapshot = await getDocs(collection(db, "attendance_logs"));
      const allLogs = [];
      const uniqueNames = new Set();

      logsSnapshot.forEach(doc => {
        const data = doc.data();
        allLogs.push({ id: doc.id, data: data });
        if(data.employee_name) uniqueNames.add(data.employee_name);
      });

      // 3. Sort staff alphabetically
      const sortedStaff = Array.from(uniqueNames).sort();
      matrixBody.innerHTML = '';

      // 4. Build the matrix rows
      sortedStaff.forEach(staffName => {
        let rowHTML = `<tr><td class="sticky-col">${staffName}</td>`;
        
        dates.forEach(dateStr => {
          // Find logs for this person on this exact date
          const daysLogs = allLogs.filter(log => 
            log.data.employee_name === staffName && 
            log.data.timestamp.toDate().toDateString() === dateStr
          );

          if (daysLogs.length === 0) {
            rowHTML += `<td class="cell-absent">Absent</td>`;
          } else {
            // Get In and Out times
            const clockIns = daysLogs.filter(l => l.data.action === "Clock In").sort((a,b) => a.data.timestamp - b.data.timestamp);
            const clockOuts = daysLogs.filter(l => l.data.action === "Clock Out").sort((a,b) => b.data.timestamp - a.data.timestamp);
            
            let timeIn = "--:--";
            let timeOut = "--:--";
            let clockInDocId = null;
            let hasTshirt = false;
            let hasIdCard = false;

            if (clockIns.length > 0) {
              timeIn = clockIns[0].data.timestamp.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
              clockInDocId = clockIns[0].id; // We attach the metadata to the Clock In document
              hasTshirt = clockIns[0].data.tshirt || false;
              hasIdCard = clockIns[0].data.id_card || false;
            }
            if (clockOuts.length > 0) {
              timeOut = clockOuts[0].data.timestamp.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            }

            // Create the cell with clickable badges. 
            // If there is no Clock In record for some reason, disable the buttons.
            if (clockInDocId) {
              rowHTML += `
                <td class="cell-present">
                  <div class="time-block">
                    In: <strong>${timeIn}</strong><br>
                    Out: <strong>${timeOut}</strong>
                  </div>
                  <div class="badge-container">
                    <div class="status-badge toggle-badge ${hasTshirt ? 'badge-yes' : 'badge-no'}" data-doc="${clockInDocId}" data-field="tshirt" data-state="${hasTshirt}">
                      T-Shirt: ${hasTshirt ? 'Yes' : 'No'}
                    </div>
                    <div class="status-badge toggle-badge ${hasIdCard ? 'badge-yes' : 'badge-no'}" data-doc="${clockInDocId}" data-field="id_card" data-state="${hasIdCard}">
                      ID Card: ${hasIdCard ? 'Yes' : 'No'}
                    </div>
                  </div>
                </td>
              `;
            } else {
               rowHTML += `
                <td class="cell-present">
                  <div class="time-block">Out only: <strong>${timeOut}</strong></div>
                  <div class="badge-container"><div class="status-badge badge-disabled">Missing Clock In</div></div>
                </td>
              `;
            }
          }
        });
        
        rowHTML += `</tr>`;
        matrixBody.innerHTML += rowHTML;
      });

      // 5. Attach Event Listeners to the new badges so they save to Firebase when clicked
      document.querySelectorAll('.toggle-badge').forEach(badge => {
        badge.addEventListener('click', async (e) => {
          const docId = e.target.getAttribute('data-doc');
          const field = e.target.getAttribute('data-field');
          const currentState = e.target.getAttribute('data-state') === 'true';
          const newState = !currentState; // Flip the state

          // Visually update immediately for the user
          e.target.setAttribute('data-state', newState.toString());
          if (newState) {
            e.target.classList.replace('badge-no', 'badge-yes');
            e.target.innerText = `${field === 'tshirt' ? 'T-Shirt' : 'ID Card'}: Yes`;
          } else {
            e.target.classList.replace('badge-yes', 'badge-no');
            e.target.innerText = `${field === 'tshirt' ? 'T-Shirt' : 'ID Card'}: No`;
          }

          // Save to Firebase Firestore
          try {
            const logRef = doc(db, "attendance_logs", docId);
            await updateDoc(logRef, {
              [field]: newState
            });
            displayToast("Record updated successfully");
          } catch (error) {
            console.error("Error updating document: ", error);
            displayToast("Error saving to database", "error");
          }
        });
      });
    }
  </script>
</body>
</html>
